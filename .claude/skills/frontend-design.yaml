# Claude Literary Salon Design System

## Core Philosophy
Warm, unhurried, intellectual literary salon aesthetic.
Parchment-toned canvas evoking high-quality paper.

>## Color System
>
>**Primary**
>- anthropic-black: #141413
>- terracotta: #c96442
>- coral: #d97757
>
>**Background**
>- parchment: #f5f4ed
>- ivory: #faf9f5
>- warm-sand: #e8e6dc
>- dark-surface: #30302e
>
>**Text**
>- charcoal: #4d4c48
>- olive-gray: #5e5d59
>- stone-gray: #87867f
>- warm-silver: #b0aea5

>## Typography
>- Headlines: Georgia, serif, weight 500
>- Body: system-ui, sans-serif
>- Line-height: 1.60 for body

>## Components
>
>**Primary Button**: bg-[#c96442] text-[#faf9f5] rounded-lg
>**Secondary Button**: bg-[#e8e6dc] text-[#4d4c48] rounded-lg
>**Card**: bg-[#faf9f5] border border-[#f0eee6] rounded-2xl
>**Input**: bg-white border border-[#e8e6dc] rounded-xl

>## DONOT
>- No cool blue-grays
>- No bold (700+) on serif
>- No sharp corners (< 6px)
>- No pure white background
